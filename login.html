<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | TaaS Work Voice Input</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #eef2ff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --danger: #ef4444;
      --danger-bg: #fef2f2;
      --success: #10b981;
      --success-bg: #f0fdf4;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,.05), 0 20px 48px rgba(79,70,229,.08);
      padding: 40px 36px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      font-size: 2.4rem;
      display: block;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
    }

    .logo p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
    }

    .alert.error { background: var(--danger-bg); color: var(--danger); display: block; }
    .alert.success { background: var(--success-bg); color: var(--success); display: block; }

    .divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: 20px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .link-btn {
      display: block;
      text-align: center;
      color: var(--primary);
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
    }

    .link-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">💬</span>
      <h1>TaaS Work Voice Input</h1>
      <p>デモサイトへようこそ</p>
    </div>

    <h2>ログイン</h2>

    <div class="alert" id="alertBox"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">ID</label>
        <input
          type="text"
          id="email"
          name="email"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">パスワード</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">ログイン</button>
    </form>

    <div class="divider">または</div>
    <a href="/register.html" class="link-btn">アカウントを作成する</a>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(msg, type) {
      alertBox.textContent = msg;
      alertBox.className = `alert ${type}`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.className = 'alert';
      submitBtn.disabled = true;
      submitBtn.textContent = 'ログイン中...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          window.location.href = '/';
        } else {
          showAlert(data.error || 'ログインに失敗しました', 'error');
        }
      } catch {
        showAlert('サーバーに接続できませんでした', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'ログイン';
      }
    });
  </script>
</body>
</html>
