<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaaS Work Voice Input Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-inner">
        <span class="logo-icon">💬</span>
        <h1>TaaS Work Voice Input</h1>
        <span class="beta-badge">Demo</span>
        <div class="header-user">
          <span class="user-name" id="userName"></span>
          <button class="logout-btn" id="logoutBtn" title="ログアウト">ログアウト</button>
        </div>
      </div>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="message-list" id="messageList">
        <div class="message assistant">
          <div class="avatar">AI</div>
          <div class="bubble">
            こんにちは！テキスト入力または音声入力でメッセージを送信してください。
          </div>
        </div>
      </div>
    </main>

    <footer class="input-area">
      <div class="input-wrapper">
        <!-- 音声認識ステータス -->
        <div class="voice-status" id="voiceStatus" aria-live="polite"></div>

        <div class="input-row">
          <textarea
            id="messageInput"
            class="message-input"
            placeholder="メッセージを入力してください..."
            rows="1"
            aria-label="メッセージ入力"
          ></textarea>

          <!-- 音声入力ボタン -->
          <button
            id="voiceBtn"
            class="icon-btn voice-btn"
            title="音声入力"
            aria-label="音声入力開始"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>

          <!-- 送信ボタン -->
          <button
            id="sendBtn"
            class="icon-btn send-btn"
            title="送信"
            aria-label="メッセージ送信"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>

        <p class="input-hint">
          <kbd>Enter</kbd> で送信 &nbsp;|&nbsp; <kbd>Shift + Enter</kbd> で改行 &nbsp;|&nbsp;
          🎤 マイクボタンで音声入力
        </p>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
