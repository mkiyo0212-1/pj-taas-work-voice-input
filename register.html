<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アカウント作成 | TaaS Work Voice Input</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --danger: #ef4444;
      --danger-bg: #fef2f2;
      --success: #10b981;
      --success-bg: #f0fdf4;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,.05), 0 20px 48px rgba(79,70,229,.08);
      padding: 40px 36px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon { font-size: 2.4rem; display: block; margin-bottom: 8px; }
    .logo h1 { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .logo p { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; }

    h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; text-align: center; }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }

    input.invalid { border-color: var(--danger); }

    .field-error {
      font-size: 0.78rem;
      color: var(--danger);
      margin-top: 4px;
      display: none;
    }

    .field-error.show { display: block; }

    .password-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
    }

    .alert.error { background: var(--danger-bg); color: var(--danger); display: block; }
    .alert.success { background: var(--success-bg); color: var(--success); display: block; }

    .divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: 20px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .link-btn {
      display: block;
      text-align: center;
      color: var(--primary);
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
    }

    .link-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">💬</span>
      <h1>TaaS Work Voice Input</h1>
      <p>新規アカウントを作成します</p>
    </div>

    <h2>アカウント作成</h2>

    <div class="alert" id="alertBox"></div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="name">お名前</label>
        <input type="text" id="name" placeholder="山田 太郎" autocomplete="name" required />
        <p class="field-error" id="nameError">お名前を入力してください</p>
      </div>

      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        <p class="field-error" id="emailError">有効なメールアドレスを入力してください</p>
      </div>

      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" placeholder="8文字以上" autocomplete="new-password" required />
        <p class="password-hint">8文字以上で設定してください</p>
        <p class="field-error" id="passwordError">パスワードは8文字以上にしてください</p>
      </div>

      <div class="form-group">
        <label for="passwordConfirm">パスワード（確認）</label>
        <input type="password" id="passwordConfirm" placeholder="もう一度入力" autocomplete="new-password" required />
        <p class="field-error" id="confirmError">パスワードが一致しません</p>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">アカウントを作成</button>
    </form>

    <div class="divider">すでにアカウントをお持ちの方</div>
    <a href="/login.html" class="link-btn">ログインする</a>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(msg, type) {
      alertBox.textContent = msg;
      alertBox.className = `alert ${type}`;
    }

    function clearAlert() {
      alertBox.className = 'alert';
    }

    function setFieldError(field, errorEl, show) {
      field.classList.toggle('invalid', show);
      errorEl.classList.toggle('show', show);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('passwordConfirm').value;

      let valid = true;

      setFieldError(
        document.getElementById('name'),
        document.getElementById('nameError'),
        !name
      );
      if (!name) valid = false;

      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      setFieldError(
        document.getElementById('email'),
        document.getElementById('emailError'),
        !emailOk
      );
      if (!emailOk) valid = false;

      setFieldError(
        document.getElementById('password'),
        document.getElementById('passwordError'),
        password.length < 8
      );
      if (password.length < 8) valid = false;

      setFieldError(
        document.getElementById('passwordConfirm'),
        document.getElementById('confirmError'),
        password !== confirm
      );
      if (password !== confirm) valid = false;

      if (!valid) return;

      submitBtn.disabled = true;
      submitBtn.textContent = '作成中...';

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          showAlert('アカウントを作成しました。ログイン画面に移動します...', 'success');
          setTimeout(() => { window.location.href = '/login.html'; }, 1500);
        } else {
          showAlert(data.error || '登録に失敗しました', 'error');
        }
      } catch {
        showAlert('サーバーに接続できませんでした', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'アカウントを作成';
      }
    });
  </script>
</body>
</html>
